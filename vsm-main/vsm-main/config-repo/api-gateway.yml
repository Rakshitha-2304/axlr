server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/customers/**
          filters:
            - AuthenticationFilter
        - id: vehicle-service
          uri: lb://vehicle-service
          predicates:
            - Path=/vehicles/**
          filters:
            - AuthenticationFilter
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/appointments/**, /packages/**
          filters:
            - AuthenticationFilter
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/payments/**
          filters:
            - AuthenticationFilter
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**
          filters:
            - AuthenticationFilter

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
